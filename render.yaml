services:
  - type: web
    name: runrealm-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --host 0.0.0.0 --port $PORT --timeout 60 --graceful-timeout 20 --max-requests 1000 --max-requests-jitter 100
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false          # set manually in Render dashboard
    healthCheckPath: /health
    autoDeploy: true
